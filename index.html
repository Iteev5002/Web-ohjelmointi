<script>
    // Haetaan nykyinen kellonaika (tunnit 0-23)
    const tunti = new Date().getHours();
    let viesti;

    // Päätetään viesti kellonajan mukaan
    if (tunti < 10 && tunti > 5) {
        viesti = "Hyvää huomenta!";
    } else if (tunti < 18 && tunti >= 10) {
        viesti = "Hyvää päivää!";
    } else if (tunti < 23 && tunti >= 18) {
        viesti = "Hyvää iltaa!";
    } else {
        viesti = "Hyvää yötä! (Oletpa myöhään liikkeellä)";
    }

    // Sijoitetaan valittu viesti HTML-elementtiin, jonka id on "tervehdys"
    document.getElementById("tervehdys").innerText = viesti;
</script>
